name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **.py

      - name: Check code formatting on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          black --check ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run tests
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pytest test/ --benchmark-skip

      - name: Run affected benchmarks
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # 1. Grab the list of all files changed in this push/PR
          ALL_CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          
          DETECTED_KEYWORDS=()
          CORE_TESTS_CHANGED="false"
          
          # 2. Parse the paths line by line
          for file in $ALL_CHANGED_FILES; do
            if [[ "$file" =~ ^src/trees/([^/]+)/ ]]; then
              # Extract the subpackage folder name directly from the path string
              FOLDER_NAME="${BASH_REMATCH[1]}"
              if [ "$FOLDER_NAME" != "base" ]; then
                DETECTED_KEYWORDS+=("$FOLDER_NAME")
              fi
            elif [[ "$file" =~ ^test/ || "$file" == "pyproject.toml" || "$file" == "requirements.txt" ]]; then
              # If someone touches the global test suite or configs, run everything
              CORE_TESTS_CHANGED="true"
            fi
          done
          
          # 3. Filter out duplicate directory names
          UNIQUE_KEYWORDS=($(echo "${DETECTED_KEYWORDS[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))
          
          # 4. Construct the execution filter string
          PYTEST_FILTER=""
          if [ "$CORE_TESTS_CHANGED" = "false" ] && [ ${#UNIQUE_KEYWORDS[@]} -gt 0 ]; then
            # Format the array into a pytest expression: "bst or native or avl" (example tree names)
            JOINED_EXPR=$(printf " or %s" "${UNIQUE_KEYWORDS[@]}")
            JOINED_EXPR=${JOINED_EXPR:4}  # Trim the leading " or "
            PYTEST_FILTER="-k \"$JOINED_EXPR\""
          fi
          
          echo "Executing pipeline with filter: $PYTEST_FILTER"
          
          pytest test/ --benchmark-only --benchmark-json=benchmark_results.json $PYTEST_FILTER

      - name: Continuous Performance Tracking
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark_results.json
          summary-always: true     # Always write to the silent Actions dashboard page
          comment-on-alert: true   # ONLY drop a PR comment if performance degenerates heavily
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true