name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **.py

      - name: Check code formatting on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          black --check ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run tests
        run: pytest test/ --benchmark-skip

      - name: Run benchmarks
        run: |
          pytest test/ --benchmark-only --benchmark-json=benchmark_results.json

      - name: Continuous Performance Tracking
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark_results.json
          # This will post a clear comparison breakdown directly into the PR comments
          comment-on-commit: true
          fail-on-alert: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}