name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write

jobs:
  standard-ci:
    name: "Tests & Structure"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting
        run: black --check .

      - name: Run unit tests
        run: pytest --benchmark-skip

  detect-changes:
    name: "Detect Modified Tree Scopes"
    runs-on: ubuntu-latest
    outputs:
      run_benchmarks: ${{ steps.filter.outputs.run_benchmarks }}
      trees: ${{ steps.filter.outputs.trees }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For commits to main that bypass branch-protection

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **.py
          files_ignore: |
            src/main.py

      - name: Determine Benchmark Scope
        id: filter
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]; then
            echo "run_benchmarks=false" >> $GITHUB_OUTPUT
            echo "trees=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          ALL_CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          DETECTED_KEYWORDS=()
          CORE_TESTS_CHANGED="false"

          for file in $ALL_CHANGED_FILES; do
            if [[ "$file" =~ ^src/trees/([^/]+)/ ]]; then
              FOLDER_NAME="${BASH_REMATCH[1]}"
              if [ "$FOLDER_NAME" != "base" ]; then
                DETECTED_KEYWORDS+=("$FOLDER_NAME")
              fi
            elif [[ "$file" =~ ^test/ || "$file" == "pyproject.toml" || "$file" == "requirements.txt" || "$file" == ".github/workflows/"* ]]; then
              CORE_TESTS_CHANGED="true"
            fi
          done

          UNIQUE_KEYWORDS=($(echo "${DETECTED_KEYWORDS[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))

          if [ "$CORE_TESTS_CHANGED" = "true" ]; then
            UNIQUE_KEYWORDS=($(find src/trees -mindepth 1 -maxdepth 1 -type d -not -name "base" -exec basename {} \;))
          fi

          if [ ${#UNIQUE_KEYWORDS[@]} -eq 0 ]; then
            echo "run_benchmarks=false" >> $GITHUB_OUTPUT
            echo "trees=[]" >> $GITHUB_OUTPUT
          else
            MATRIX_JSON=$(printf '%s\n' "${UNIQUE_KEYWORDS[@]}" | jq -R . | jq -s -c .)
            echo "run_benchmarks=true" >> $GITHUB_OUTPUT
            echo "trees=$MATRIX_JSON" >> $GITHUB_OUTPUT
          fi

  run-benchmarks:
    name: "Performance Benchmarks"
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run_benchmarks == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tree: ${{ fromJson(needs.detect-changes.outputs.trees) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmarks for ${{ matrix.tree }}
        run: |
          pytest --benchmark-only -k "${{ matrix.tree }}" --benchmark-json=benchmark_results.json

      - name: Continuous Performance Tracking
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark_results.json
          name: "${{ matrix.tree }}"
          summary-always: true
          comment-on-alert: true
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          benchmark-data-dir-path: "dev/bench/${{ matrix.tree }}"

      - name: Upload result artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.tree }}
          path: benchmark_results.json

  publish-benchmarks:
    name: "Publish Performance Dashboards"
    needs: [ detect-changes, run-benchmarks ]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.run_benchmarks == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        tree: ${{ fromJson(needs.detect-changes.outputs.trees) }}
      max-parallel: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download specific benchmark result
        uses: actions/download-artifact@v4
        with:
          name: benchmark-${{ matrix.tree }}
          path: collected-benchmarks

      - name: Publish Metrics for ${{ matrix.tree }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: collected-benchmarks/benchmark_results.json
          name: "${{ matrix.tree }} Architecture"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: "dev/bench/${{ matrix.tree }}"